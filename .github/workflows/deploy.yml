name: Build and Deploy
on: 
  workflow_dispatch: 
jobs:
  build-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Build image
        run: |
          docker build -t myapp:latest .
      - name: Push to ACR
        run: |
          - name: Sign in to Azure
            uses: azure/login@v2
            with:
              creds: ${{secrets.AZURE_CREDENTIALS}}
          az acr login -n labdeployacrlaurent
          docker tag myapp:latest labdeployacrlaurent.azurecr.io/myapp:latest
          docker push labdeployacrlaurent.azurecr.io/myapp:latest
      - name: Deploy to WebApp
        run: |
          az webapp config container set \
          -g RGLabDeploy-laurent \
          -n labdeploy-webapp-laurent \
          --container-image-name labdeployacrlaurent.azurecr.io/myapp:latest \
          --container-registry-url https://labdeployacrlaurent.azurecr.io \
          --container-registry-user <USERNAME> \
          --container-registry-password <PASSWORD>
